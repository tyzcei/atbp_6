name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-jest-${{ matrix.node-version }}
          path: allure-results/

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000
      - run: npm run test:api
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-cucumber
          path: allure-results/

  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000
      - run: npm run test:ui
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-playwright
          path: allure-results/

  allure-report:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          path: all-results
      - name: Merge and Generate
        run: |
          mkdir -p allure-results
          find all-results -type f -name "*.json" -exec cp {} allure-results/ \;
          npm ci
          npx allure generate allure-results --clean -o allure-report
      - name: Final Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-allure-report
          path: allure-report/

  send-notification:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()
    steps:
      - name: send telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Статус сборки: ${{ job.status }}
            Репозиторий: ${{ github.repository }}
            Ветка: ${{ github.ref_name }}
            Результаты тестов доступны в GitHub Actions.